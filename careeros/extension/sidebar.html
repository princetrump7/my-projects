<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0A0A0E;
      color: #F5F1EB;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, #E879A3, #F5A1C0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: #000;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .card {
      background: rgba(18, 18, 26, 0.6);
      border: 1px solid rgba(245, 241, 235, 0.06);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      color: #8a8a92;
    }
    .score {
      font-size: 36px;
      font-weight: 800;
      text-align: center;
    }
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 6px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary {
      background: #E879A3;
      color: #000;
    }
    .btn-secondary {
      background: rgba(245, 241, 235, 0.06);
      color: #F5F1EB;
      border: 1px solid rgba(245, 241, 235, 0.08);
    }
    .btn-secondary:hover {
      background: rgba(245, 241, 235, 0.1);
    }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin: 2px;
    }
    .badge-missing {
      background: rgba(232, 121, 163, 0.15);
      color: #E879A3;
    }
    .badge-success {
      background: rgba(52, 211, 153, 0.15);
      color: #34D399;
    }
    .badge-warning {
      background: rgba(245, 158, 11, 0.15);
      color: #F59E0B;
    }
    .progress-bar {
      height: 6px;
      background: rgba(245, 241, 235, 0.08);
      border-radius: 3px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .footer {
      text-align: center;
      padding: 16px 0;
      font-size: 11px;
      color: #8a8a92;
    }
    .loading {
      text-align: center;
      padding: 40px 0;
      color: #8a8a92;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(245, 241, 235, 0.08);
      border-top-color: #E879A3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #container { display: none; }
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: rgba(245, 241, 235, 0.04);
      border-radius: 10px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      color: #8a8a92;
    }
    .tab.active {
      background: rgba(18, 18, 26, 0.8);
      color: #E879A3;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0A0A0E; }
    ::-webkit-scrollbar-thumb { background: rgba(245, 241, 235, 0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(245, 241, 235, 0.15); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-icon">C</div>
    <span class="logo-text">CareerOS</span>
  </div>

  <div class="tab-bar">
    <button class="tab active" data-tab="analyze">Analyze</button>
    <button class="tab" data-tab="optimize">Optimize</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <div id="container">
    <div id="analyze-tab">
      <div id="analyze-content">
        <p style="color:#8a8a92;text-align:center;padding:20px 0;font-size:13px;">
          Navigate to a LinkedIn profile to analyze it with CareerOS.
        </p>
      </div>
      <button class="btn btn-primary" id="analyze-profile-btn">Analyze This Profile</button>
    </div>

    <div id="optimize-tab" style="display:none;">
      <div id="optimize-content">
        <p style="color:#8a8a92;text-align:center;padding:20px 0;font-size:13px;">
          Navigate to a LinkedIn job posting to optimize your CV.
        </p>
      </div>
      <button class="btn btn-primary" id="optimize-job-btn">Optimize for This Job</button>
    </div>

    <div id="settings-tab" style="display:none;">
      <div class="card">
        <div class="card-title">Account</div>
        <button class="btn btn-secondary" id="signin-btn">Sign In</button>
        <button class="btn btn-secondary" id="signout-btn" style="display:none;">Sign Out</button>
      </div>
      <div class="card">
        <div class="card-title">Quick Links</div>
        <button class="btn btn-secondary" onclick="window.open('https://careeros-roan.vercel.app/dashboard','_blank')">
          Open Dashboard
        </button>
        <button class="btn btn-secondary" onclick="window.open('https://careeros-roan.vercel.app/upload','_blank')">
          Upload CV
        </button>
      </div>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading CareerOS...</p>
  </div>

  <div class="footer">
    CareerOS — AI Career Intelligence
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
