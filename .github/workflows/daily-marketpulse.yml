name: Daily MarketPulse Brief

on:
  schedule:
    # Runs every day at 13:00 UTC.
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  run-marketpulse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: marketpulse

    env:
      CI_ONE_SHOT: "true"
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MARKETPULSE_ASSETS: ${{ vars.MARKETPULSE_ASSETS || 'GOLD=GLD,SPY=SPY,NASDAQ=^IXIC,BTC=BTC-USD' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: marketpulse/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run MarketPulse once
        run: python main.py
