name: MarketPulse Briefs

on:
  schedule:
    - cron: "15 13 * * 1-5"   # 13:15 UTC = morning brief (weekdays)
    - cron: "30 20 * * 1-5"   # 20:30 UTC = evening recap (weekdays)
  workflow_dispatch:
    inputs:
      type:
        description: 'Brief type'
        required: false
        default: 'morning'
        type: choice
        options: [morning, evening]

jobs:
  run-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: marketpulse

    env:
      CI_ONE_SHOT: "true"
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemma-4-26b-a4b-it:free' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (for opencode CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install opencode CLI
        run: npm install -g opencode-ai

      - name: Configure opencode auth
        run: |
          mkdir -p ~/.local/share/opencode
          cat > ~/.local/share/opencode/auth.json << EOF
          {"opencode":{"type":"api","key":"${{ secrets.OPENCODE_ZEN_API_KEY }}"}}
          EOF
          echo "auth.json created"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: marketpulse/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Determine brief type
        id: type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TYPE="${{ github.event.inputs.type }}"
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "13" ]; then
              TYPE="morning"
            else
              TYPE="evening"
            fi
          fi
          echo "BRIEF_TYPE=$TYPE" >> $GITHUB_ENV

      - name: Run brief
        run: python run_scheduled.py --type ${{ env.BRIEF_TYPE }}
