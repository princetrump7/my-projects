name: MarketPulse

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Brief type'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening
          - full
  push:
    paths:
      - 'marketpulse/**'
      - '.github/workflows/marketpulse.yml'
  pull_request:
    paths:
      - 'marketpulse/**'
      - '.github/workflows/marketpulse.yml'
  schedule:
    # Morning brief — 8:00 AM ET (12:00 UTC) weekdays
    - cron: '0 12 * * 1-5'
    # Evening recap — 6:00 PM ET (22:00 UTC) weekdays
    - cron: '0 22 * * 1-5'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r marketpulse/requirements.txt

      - name: Determine brief type (scheduled runs only)
        id: brief_type
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$HOUR" = "12" ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "22" ]; then
              echo "type=evening" >> $GITHUB_OUTPUT
            else
              echo "type=full" >> $GITHUB_OUTPUT
            fi
          else
            # Push/PR/dispatch — check manual input or default to full
            echo "type=${{ github.event.inputs.type || 'full' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run scheduled brief
        if: steps.brief_type.outputs.type == 'morning' || steps.brief_type.outputs.type == 'evening'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python -u marketpulse/run_scheduled.py --type ${{ steps.brief_type.outputs.type }}

      - name: Run full test cycle (push/PR/manual)
        if: steps.brief_type.outputs.type == 'full'
        env:
          CI_ONE_SHOT: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python -u marketpulse/main.py
