services:
  - type: web
    name: marketpulse-bot
    runtime: python
    repo: https://github.com/princetrump7/my-projects
    buildCommand: pip install -r marketpulse/requirements.txt
    startCommand: cd marketpulse && python main.py
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WEBHOOK_URL
        fromService:
          type: web
          name: marketpulse-bot
          property: url
      - key: PORT
        value: 8080
