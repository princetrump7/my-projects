<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calming Starfield</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            cursor: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="hint">Move your mouse to guide the stars</div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        let velocityX = 0, velocityY = 0;

        const stars = [];
        const numStars = 200;
        const connectionDistance = 100;
        const friction = 0.95;
        const mouseInfluence = 0.02;

        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.baseSize = this.size;
                this.brightness = Math.random() * 0.5 + 0.5;
                this.baseBrightness = this.brightness;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.twinkleOffset = Math.random() * Math.PI * 2;
                this.vx = 0;
                this.vy = 0;
                this.mass = Math.random() * 0.5 + 0.5;
            }

            update(deltaTime) {
                // Twinkle effect
                const twinkle = Math.sin(Date.now() * this.twinkleSpeed + this.twinkleOffset) * 0.3 + 0.7;
                this.brightness = this.baseBrightness * twinkle;

                // Size pulse
                this.size = this.baseSize * (0.8 + twinkle * 0.4);

                // Mouse influence - gentle pull towards/away from mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const maxDistance = 300;

                if (distance < maxDistance && distance > 0) {
                    const force = (1 - distance / maxDistance) * mouseInfluence * this.mass;
                    const moveX = (dx / distance) * force * 50;
                    const moveY = (dy / distance) * force * 50;

                    // Stars move away from mouse slightly
                    this.vx -= moveX * 0.5;
                    this.vy -= moveY * 0.5;

                    // Brighten when near mouse
                    this.brightness = Math.min(1, this.brightness + (1 - distance / maxDistance) * 0.5);
                }

                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;

                // Apply friction
                this.vx *= friction;
                this.vy *= friction;

                // Boundary wrapping with smooth transition
                const margin = 50;
                if (this.x < -margin) this.x = width + margin;
                if (this.x > width + margin) this.x = -margin;
                if (this.y < -margin) this.y = height + margin;
                if (this.y > height + margin) this.y = -margin;

                // Add subtle drift
                this.x += Math.sin(Date.now() * 0.001 + this.twinkleOffset) * 0.1;
                this.y += Math.cos(Date.now() * 0.001 + this.twinkleOffset) * 0.1;
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );

                const alpha = this.brightness;
                gradient.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
                gradient.addColorStop(0.3, `rgba(200, 220, 255, ${alpha * 0.8})`);
                gradient.addColorStop(1, `rgba(150, 180, 255, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function init() {
            resize();
            createStars();
            animate();
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            // Recenter mouse on resize
            mouseX = width / 2;
            mouseY = height / 2;
            targetX = width / 2;
            targetY = height / 2;
        }

        function createStars() {
            stars.length = 0;
            for (let i = 0; i < numStars; i++) {
                stars.push(new Star());
            }
        }

        function drawConnections() {
            for (let i = 0; i < stars.length; i++) {
                for (let j = i + 1; j < stars.length; j++) {
                    const dx = stars[j].x - stars[i].x;
                    const dy = stars[j].y - stars[i].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        const opacity = (1 - distance / connectionDistance) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(stars[i].x, stars[i].y);
                        ctx.lineTo(stars[j].x, stars[j].y);
                        ctx.strokeStyle = `rgba(150, 180, 255, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            // Smooth mouse following
            targetX += (mouseX - targetX) * 0.1;
            targetY += (mouseY - targetY) * 0.1;

            // Clear canvas with slight fade for trail effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw stars
            for (const star of stars) {
                star.update();
            }

            // Draw connections between nearby stars
            drawConnections();

            // Draw stars on top
            for (const star of stars) {
                star.draw();
            }

            // Draw ambient glow at mouse position
            const mouseGlow = ctx.createRadialGradient(
                targetX, targetY, 0,
                targetX, targetY, 150
            );
            mouseGlow.addColorStop(0, 'rgba(100, 140, 200, 0.03)');
            mouseGlow.addColorStop(1, 'rgba(100, 140, 200, 0)');
            ctx.fillStyle = mouseGlow;
            ctx.fillRect(0, 0, width, height);

            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        // Hide hint after first mouse movement
        let hintHidden = false;
        canvas.addEventListener('mousemove', () => {
            if (!hintHidden) {
                document.querySelector('.hint').style.opacity = '0';
                hintHidden = true;
            }
        }, { once: true });

        // Start
        init();
    </script>
</body>
</html>
