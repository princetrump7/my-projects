name: GSE Trading Bot

# ─── Triggers ────────────────────────────────────────────────────────────────
# Cron fires every 10 min during GSE market hours (09:30–15:00 UTC/WAT Mon-Fri).
# The Python script itself double-checks market_open() and exits immediately if
# the market is closed, so a slightly-wide cron window is safe and cheap.
# Manual trigger lets you run a scan or force-restart at any time.
on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/gse-bot.yml'
      - 'bot.py'
      - 'requirements.txt'
      - 'README.md'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging (BOT_DEBUG=1)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '*/10 9-15 * * 1-5'   # Mon–Fri, 09:xx–15:xx UTC

# ─── Concurrency ─────────────────────────────────────────────────────────────
# Prevents two simultaneous scans if a run takes longer than 10 min.
# 'cancel-in-progress: false' queues the new run rather than discarding it,
# so no scan is ever silently skipped.
concurrency:
  group: gse-bot-scan
  cancel-in-progress: false

jobs:
  scan:
    name: GSE Market Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5        # Each scan should finish in < 30s; 5 min is generous.

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      # ── 4. Bot state cache ───────────────────────────────────────────────────
      # Save key is unique per run (immutable cache); restore-keys find the latest
      # state for this OS / date.
      - name: Set TODAY env var (WAT = UTC+0)
        id: today
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "TODAY=$TODAY" >> "$GITHUB_ENV"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Restore bot state cache
        uses: actions/cache@v4
        with:
          path: |
            history.json
            volume.json
            alert_state.json
          key: gse-state-${{ runner.os }}-${{ steps.today.outputs.today }}-${{ github.run_id }}
          restore-keys: |
            gse-state-${{ runner.os }}-${{ steps.today.outputs.today }}-
            gse-state-${{ runner.os }}-

      # ── 5. Run scan ──────────────────────────────────────────────────────────
      - name: Run GSE scan
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          PYTHONUNBUFFERED: '1'
          BOT_DEBUG: ${{ github.event_name == 'workflow_dispatch' && inputs.debug && '1' || '0' }}

      - name: Upload bot state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gse-bot-state
          path: |
            history.json
            volume.json
            alert_state.json
          if-no-files-found: ignore
          retention-days: 7
