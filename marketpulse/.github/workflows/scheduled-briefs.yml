name: Scheduled MarketPulse Briefs

on:
  schedule:
    # Morning Brief: 9:15 AM EDT = 13:15 UTC (Mon-Fri)
    - cron: '15 13 * * 1-5'
    # Evening Recap: 4:30 PM EDT = 20:30 UTC (Mon-Fri)
    - cron: '30 20 * * 1-5'
  
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      type:
        description: 'Type of brief to run'
        required: true
        type: choice
        options:
          - morning
          - evening

jobs:
  run-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine Brief Type
        id: determine_type
        run: |
          # If triggered manually, use the input type
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "BRIEF_TYPE=${{ github.event.inputs.type }}" >> $GITHUB_ENV
          else
            # If scheduled, determine based on current UTC time
            # 13:xx is Morning, 20:xx is Evening
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "13" ]; then
              echo "BRIEF_TYPE=morning" >> $GITHUB_ENV
            elif [ "$HOUR" = "20" ]; then
              echo "BRIEF_TYPE=evening" >> $GITHUB_ENV
            else
              echo "BRIEF_TYPE=morning" >> $GITHUB_ENV # fallback
            fi
          fi

      - name: Run Brief Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python run_scheduled.py --type $BRIEF_TYPE
