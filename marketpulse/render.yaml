services:
  - type: worker
    name: marketpulse-bot
    runtime: python
    repo: https://github.com/princetrump7/my-projects
    buildCommand: pip install -r marketpulse/requirements.txt
    startCommand: cd marketpulse && python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
